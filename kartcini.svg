<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Arka Plan Gradyanı (Modern Gece Mavisi) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0F24" />
      <stop offset="100%" stop-color="#1A244D" />
    </linearGradient>
    
    <!-- Kredi Kartı Gradyanı (Canlı Neon Mor/Pembe) -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2CBF" />
      <stop offset="100%" stop-color="#E0AAFF" />
    </linearGradient>

    <!-- Sihirli Cini/Yapay Zeka Işıltısı Gradyanı (Neon Turkuaz) -->
    <linearGradient id="magicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5D4" />
      <stop offset="100%" stop-color="#00BBF9" />
    </linearGradient>
  </defs>

  <!-- 1. Arka Plan: Yuvarlatılmış Kare -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- 2. Arka Plan Detayı: İnce Yapay Zeka Ağ Çizgileri -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2" />
  <circle cx="256" cy="256" r="120" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1.5" />

  <!-- 3. Ana Öğe: Kredi Kartı -->
  <g transform="rotate(-12 256 256) translate(0, -10)">
    <!-- Kart Gövdesi -->
    <rect x="136" y="181" width="240" height="150" rx="16" fill="url(#cardGrad)" />
    <!-- Kartın Elektronik Çipi (Altın/Sarı) -->
    <rect x="166" y="215" width="36" height="28" rx="6" fill="#FFD166" />
    <!-- Kart Üzerindeki Soyut Çizgiler -->
    <line x1="214" y1="221" x2="254" y2="221" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5" />
    <line x1="214" y1="233" x2="274" y2="233" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5" />
    <!-- Mini Soyut Logo Yuvarlağı -->
    <circle cx="330" cy="295" r="14" fill="#FFFFFF" opacity="0.4" />
    <circle cx="344" cy="295" r="14" fill="#FFFFFF" opacity="0.2.5" />
  </g>

  <!-- 4. Cini / Yapay Zeka Öğesi: Sihirli Işıltı ve Akıllı Veri Kıvılcımları -->
  <!-- Ana Sihirli Parıltı (Dört Köşeli AI Yıldızı) -->
  <path d="M 340 160 Q 340 210 390 210 Q 340 210 340 260 Q 340 210 290 210 Q 340 210 340 160 Z" fill="url(#magicGrad)" />
  
  <!-- Küçük Destekçi Kıvılcımlar -->
  <path d="M 160 100 Q 160 120 180 120 Q 160 120 160 140 Q 160 120 140 120 Q 160 120 160 100 Z" fill="#00F5D4" />
  <path d="M 380 360 Q 380 375 395 375 Q 380 375 380 390 Q 380 375 365 375 Q 380 375 380 360 Z" fill="#00BBF9" />
  
  <!-- Küçük Veri Noktaları -->
  <circle cx="110" cy="260" r="7" fill="#00F5D4" />
  <circle cx="230" cy="410" r="5" fill="#00BBF9" />
  <circle cx="420" cy="110" r="6" fill="#E0AAFF" />
</svg>
